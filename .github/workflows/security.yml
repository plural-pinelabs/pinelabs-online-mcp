name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run security lints
        run: ruff check --select S .
